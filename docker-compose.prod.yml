version: '3.8'

services:
  neuralia-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuralia-app
    restart: always
    ports:
      - "4019:4019"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=https://neuralia.agyemanenterprises.com
    networks:
      - coolify

networks:
  coolify:
    external: true
