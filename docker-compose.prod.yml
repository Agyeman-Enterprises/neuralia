version: '3.8'

services:
  neuralia-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuralia-app
    restart: always
    ports:
      - "4019:4019"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=https://neuralia.agyemanenterprises.com
      - NEURALIA_SUPABASE_URL=${NEURALIA_SUPABASE_URL}
      - NEURALIA_SUPABASE_SERVICE_ROLE_KEY=${NEURALIA_SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - CF_SUPABASE_URL=${CF_SUPABASE_URL}
      - CF_SUPABASE_SERVICE_ROLE_KEY=${CF_SUPABASE_SERVICE_ROLE_KEY}
      - STRATOVA_SUPABASE_URL=${STRATOVA_SUPABASE_URL}
      - STRATOVA_SUPABASE_SERVICE_ROLE_KEY=${STRATOVA_SUPABASE_SERVICE_ROLE_KEY}
    networks:
      - coolify

networks:
  coolify:
    external: true
